name: Update workout diary

on:
  push:
    paths:
      - update_diary.py
      - .github/workflows/update-diary.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Update index.html
        run: python update_diary.py
      - name: Commit changes
        run: |
          if git diff --quiet -- index.html; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add workouts for 13, 15 and 17 July 2026"
          git push
